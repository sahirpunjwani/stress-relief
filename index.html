<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wreck the Robot - 3D Sandbox</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
            touch-action: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            box-sizing: border-box;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .hud-element {
            background: rgba(15, 12, 30, 0.85);
            padding: 12px 24px;
            border-radius: 12px;
            border: 2px solid #e94560;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #score-board {
            align-self: flex-start;
            font-size: 24px;
        }

        #instructions {
            align-self: center;
            margin-bottom: 20px;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="score-board" class="hud-element">
            🪙 COINS: <span id="coin-count">0</span>
        </div>
        <div id="instructions" class="hud-element">
            Click & Hold directly on the blue robot to grab and smash it!
        </div>
    </div>

    <script type="module">
        // Importing modules explicitly via direct CDN paths eliminates browser security rejection
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import * as CANNON from 'https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js';

        let scene, camera, renderer, world;
        let container = document.getElementById('canvas-container');
        let coins = 0;
        const coinCountEl = document.getElementById('coin-count');

        const rigidBodies = [];
        const meshes = [];

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        const dragPlane = new THREE.Plane(); 
        const intersectionPoint = new THREE.Vector3();
        
        let isDragging = false;
        let dummyPivotBody; 
        let mouseConstraint = null;

        function init() {
            setupGraphics();
            setupPhysics();
            createEnvironment();
            createRagdoll(0, 6, 0);
            setupInteraction();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function setupGraphics() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x11111e);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 9);
            camera.lookAt(0, 3, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 15, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);

            const grid = new THREE.GridHelper(40, 40, 0x3f3f5c, 0x22223b);
            scene.add(grid);
        }

        function setupPhysics() {
            world = new CANNON.World();
            world.gravity.set(0, -18, 0); 
            world.solver.iterations = 15; 

            dummyPivotBody = new CANNON.Body({ mass: 0 });
            dummyPivotBody.type = CANNON.Body.STATIC;
            dummyPivotBody.collisionFilterGroup = 0; 
            dummyPivotBody.collisionFilterMask = 0;
            world.addBody(dummyPivotBody);
        }

        function createEnvironment() {
            createBox(30, 1, 30, 0, -0.5, 0, 0x22223b, 0);
            createBox(30, 20, 1, 0, 10, -5, 0x14142b, 0);
        }

        function createBox(w, h, d, x, y, z, color, mass = 0) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            mesh.receiveShadow = true;
            scene.add(mesh);

            const shape = new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2));
            const body = new CANNON.Body({ mass: mass });
            body.addShape(shape);
            body.position.set(x, y, z);
            world.addBody(body);
            return body;
        }

        function createRagdoll(x, y, z) {
            const tW = 0.8, tH = 1.4, tD = 0.5; 
            const hR = 0.35; 
            const lW = 0.25, lH = 0.9, lD = 0.25; 

            const torso = createRagdollPart(tW, tH, tD, x, y, z, 0x00b4d8, 4);
            const head = createRagdollPart(hR*2, hR*2, hR*2, x, y + tH/2 + hR, z, 0xffe66d, 1);
            
            const leftArm = createRagdollPart(lW, lH, lD, x - tW/2 - lW/2, y + 0.3, z, 0x0077b6, 1);
            const rightArm = createRagdollPart(lW, lH, lD, x + tW/2 + lW/2, y + 0.3, z, 0x0077b6, 1);
            
            const leftLeg = createRagdollPart(lW, lH, lD, x - 0.25, y - tH/2 - lH/2, z, 0x03045e, 1);
            const rightLeg = createRagdollPart(lW, lH, lD, x + 0.25, y - tH/2 - lH/2, z, 0x03045e, 1);

            addJoint(torso, new CANNON.Vec3(0, tH/2, 0), head, new CANNON.Vec3(0, -hR, 0));
            addJoint(torso, new CANNON.Vec3(-tW/2, 0.4, 0), leftArm, new CANNON.Vec3(0, lH/2, 0));
            addJoint(torso, new CANNON.Vec3(tW/2, 0.4, 0), rightArm, new CANNON.Vec3(0, lH/2, 0));
            addJoint(torso, new CANNON.Vec3(-0.25, -tH/2, 0), leftLeg, new CANNON.Vec3(0, lH/2, 0));
            addJoint(torso, new CANNON.Vec3(0.25, -tH/2, 0), rightLeg, new CANNON.Vec3(0, lH/2, 0));
        }

        function createRagdollPart(w, h, d, x, y, z, color, mass) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.2 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            scene.add(mesh);

            const shape = new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2));
            const body = new CANNON.Body({ mass: mass });
            body.addShape(shape);
            body.position.set(x, y, z);
            
            body.linearDamping = 0.1;
            body.angularDamping = 0.1;

            body.addEventListener('collide', (e) => {
                const speed = e.contact.getImpactVelocityAlongNormal();
                if (speed > 5) {
                    let earned = Math.floor(speed);
                    coins += earned;
                    coinCountEl.innerText = coins;

                    mesh.material.color.setHex(0xffffff);
                    setTimeout(() => mesh.material.color.setHex(color), 80);
                }
            });

            world.addBody(body);
            
            rigidBodies.push(body);
            meshes.push(mesh);

            return body;
        }

        function addJoint(bodyA, pivotA, bodyB, pivotB) {
            const constraint = new CANNON.PointToPointConstraint(bodyA, pivotA, bodyB, pivotB);
            world.addConstraint(constraint);
        }

        function setupInteraction() {
            window.addEventListener('pointerdown', onPointerDown, { passive: false });
            window.addEventListener('pointermove', onPointerMove, { passive: false });
            window.addEventListener('pointerup', onPointerUp);
        }

        function onPointerDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(meshes, false);

            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const index = meshes.indexOf(hitMesh);

                if (index !== -1) {
                    isDragging = true;
                    const hitBody = rigidBodies[index];
                    const hitPoint = intersects[0].point;

                    const normal = new THREE.Vector3();
                    camera.getWorldDirection(normal);
                    normal.negate(); 
                    dragPlane.setFromNormalAndCoplanarPoint(normal, hitPoint);

                    dummyPivotBody.position.set(hitPoint.x, hitPoint.y, hitPoint.z);

                    const localPivot = hitBody.toLocalFrame(new CANNON.Vec3(hitPoint.x, hitPoint.y, hitPoint.z));

                    if (mouseConstraint) world.removeConstraint(mouseConstraint);

                    mouseConstraint = new CANNON.PointToPointConstraint(dummyPivotBody, new CANNON.Vec3(0, 0, 0), hitBody, localPivot);
                    world.addConstraint(mouseConstraint);
                }
            }
        }

        function onPointerMove(event) {
            if (!isDragging || !mouseConstraint) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            if (raycaster.ray.intersectPlane(dragPlane, intersectionPoint)) {
                dummyPivotBody.position.set(intersectionPoint.x, intersectionPoint.y, intersectionPoint.z);
                mouseConstraint.bodyB.wakeUp(); 
            }
        }

        function onPointerUp() {
            if (isDragging) {
                world.removeConstraint(mouseConstraint);
                mouseConstraint = null;
                isDragging = false;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            world.fixedStep(1 / 60);

            for (let i = 0; i < rigidBodies.length; i++) {
                meshes[i].position.copy(rigidBodies[i].position);
                meshes[i].quaternion.copy(rigidBodies[i].quaternion);
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
